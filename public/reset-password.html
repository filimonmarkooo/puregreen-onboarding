<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Green | Set New Password</title>
<link rel="stylesheet" href="/css/brand.css">
<style>
  body { display:flex; flex-direction:column; min-height:100vh; align-items:center; justify-content:center; background:var(--pg-offwhite); padding:24px; }
  .box { background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:40px; max-width:440px; width:100%; }
  .logo { font-family:var(--font-body); font-weight:700; font-size:22px; color:var(--pg-charcoal); margin-bottom:28px; }
  .logo span { color:var(--pg-light-green); }
  h2 { font-family:var(--font-headline); font-size:28px; font-weight:700; text-transform:uppercase; color:var(--pg-dark-green); margin-bottom:8px; }
  p { font-size:14px; color:#888; margin-bottom:24px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">pure<span>green</span></div>
  <h2>Set New Password</h2>
  <p>Choose a strong password for your account.</p>
  <div class="alert alert-error" id="err"></div>
  <div class="alert alert-success" id="suc"></div>
  <div class="form-group">
    <label class="form-label">New Password</label>
    <input class="form-input" type="password" id="pw" placeholder="Min 8 characters" />
  </div>
  <div class="form-group">
    <label class="form-label">Confirm Password</label>
    <input class="form-input" type="password" id="pw2" placeholder="Repeat password" />
  </div>
  <button class="btn btn-primary btn-full" onclick="reset()" id="btn">Update Password</button>
</div>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) { document.querySelector('p').textContent = 'Invalid reset link.'; }

async function reset() {
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  hide('err'); hide('suc');
  if (pw.length < 8) return show('err','Password must be at least 8 characters.');
  if (pw !== pw2) return show('err','Passwords do not match.');
  const btn = document.getElementById('btn');
  btn.disabled=true; btn.textContent='Updating…';
  const res = await fetch('/api/auth/reset-password', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw})});
  const d = await res.json();
  if (d.success) { show('suc','Password updated! Redirecting to login…'); setTimeout(() => window.location.href='/', 2000); }
  else { show('err', d.error||'Reset failed. Link may have expired.'); btn.disabled=false; btn.textContent='Update Password'; }
}
function show(id, msg) { const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }
</script>
</body>
</html>
