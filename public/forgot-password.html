<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Green | Reset Password</title>
<link rel="stylesheet" href="/css/brand.css">
<style>
  body { display:flex; flex-direction:column; min-height:100vh; align-items:center; justify-content:center; background:var(--pg-offwhite); padding: 24px; }
  .box { background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:40px; max-width:440px; width:100%; }
  .logo { font-family:var(--font-body); font-weight:700; font-size:22px; color:var(--pg-charcoal); margin-bottom:28px; }
  .logo span { color:var(--pg-light-green); }
  h2 { font-family:var(--font-headline); font-size:28px; font-weight:700; text-transform:uppercase; color:var(--pg-dark-green); margin-bottom:8px; }
  p { font-size:14px; color:#888; line-height:1.6; margin-bottom:24px; }
  .back { display:inline-block; margin-top:16px; font-size:13px; color:var(--pg-dark-green); text-decoration:none; }
  .back:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">pure<span>green</span></div>
  <h2>Forgot Password</h2>
  <p>Enter your email address and we'll send you a link to reset your password.</p>
  <div class="alert alert-error" id="err"></div>
  <div class="alert alert-success" id="suc"></div>
  <div class="form-group">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" id="email" placeholder="your@email.com" />
  </div>
  <button class="btn btn-primary btn-full" onclick="send()" id="btn">Send Reset Link</button>
  <a href="/" class="back">← Back to Sign In</a>
</div>
<script>
async function send() {
  const email = document.getElementById('email').value.trim();
  if (!email) { show('err', 'Please enter your email.'); return; }
  const btn = document.getElementById('btn');
  btn.disabled=true; btn.textContent='Sending…';
  hide('err'); hide('suc');
  const res = await fetch('/api/auth/forgot-password', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  const d = await res.json();
  if (d.success) show('suc', 'If that email is registered, a reset link has been sent. Check your inbox.');
  else show('err', d.error || 'Something went wrong.');
  btn.disabled=false; btn.textContent='Send Reset Link';
}
function show(id, msg) { const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }
document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
</script>
</body>
</html>
